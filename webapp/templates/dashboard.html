{% extends "base.html" %}
{% block content %}
<div class="page-header">
  <h2 class="page-title">Tổng Quan</h2>
</div>

<!-- KPI Cards -->
<div class="kpi-grid" id="kpiGrid">
  <div class="kpi-card kpi-purple" data-delay="0">
    <div class="kpi-icon"></div>
    <div class="kpi-info">
      <span class="kpi-label">Tổng Doanh Thu</span>
      <span class="kpi-value" id="kpiRevenue">—</span>
    </div>
    <div class="kpi-decoration"></div>
  </div>
  <div class="kpi-card kpi-cyan" data-delay="1">
    <div class="kpi-icon"></div>
    <div class="kpi-info">
      <span class="kpi-label">Tổng Đơn Hàng</span>
      <span class="kpi-value" id="kpiOrders">—</span>
    </div>
    <div class="kpi-decoration"></div>
  </div>
  <div class="kpi-card kpi-orange" data-delay="2">
    <div class="kpi-icon"></div>
    <div class="kpi-info">
      <span class="kpi-label">Đánh Giá TB</span>
      <span class="kpi-value" id="kpiReview">—</span>
    </div>
    <div class="kpi-decoration"></div>
  </div>
  <div class="kpi-card kpi-green" data-delay="3">
    <div class="kpi-icon"></div>
    <div class="kpi-info">
      <span class="kpi-label">Tổng Khách Hàng</span>
      <span class="kpi-value" id="kpiCustomers">—</span>
    </div>
    <div class="kpi-decoration"></div>
  </div>
</div>

<!-- Charts Row -->
<div class="charts-grid-2">
  <div class="card card-chart animate-in" style="--delay:.2s">
    <div class="card-header">
      <h3> Xu Hướng Doanh Thu Theo Tháng</h3>
    </div>
    <div class="card-body chart-container">
      <canvas id="revenueChart"></canvas>
    </div>
  </div>
  <div class="card card-chart animate-in" style="--delay:.35s">
    <div class="card-header">
      <h3> Top 10 Danh Mục Theo Doanh Thu</h3>
    </div>
    <div class="card-body chart-container">
      <canvas id="categoryChart"></canvas>
    </div>
  </div>
</div>
{% endblock %}
