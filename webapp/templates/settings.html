{% extends "base.html" %}

{% block title %}Cài Đặt{% endblock %}

{% block content %}
<div class="page-header">
  <h2 class="page-title">Cài Đặt Hệ Thống</h2>
</div>

<div class="card">
  <div class="card-body">
    <div class="form-group" style="margin-bottom: 1.5rem;">
      <label class="form-label" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Ngôn ngữ dữ liệu</label>
      <select id="langSelect" class="form-control" style="width: 100%; max-width: 400px; padding: 0.7rem; border-radius: 8px; border: 1px solid #e2e8f0;">
        <option value="VI">Tiếng Việt</option>
        <option value="EN">Tiếng Anh</option>
      </select>
    </div>

    <div class="form-group" style="margin-bottom: 2rem;">
      <label class="form-label" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Đơn vị tiền tệ</label>
      <select id="currencySelect" class="form-control" style="width: 100%; max-width: 400px; padding: 0.7rem; border-radius: 8px; border: 1px solid #e2e8f0;">
        <option value="VND">Việt Nam Đồng (VNĐ)</option>
        <option value="BRL">Real Brazil (BRL)</option>
      </select>
    </div>

    <button id="saveSettingsBtn" class="btn btn-primary" style="background: var(--accent-purple); color: white; padding: 0.8rem 1.5rem; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">
      Lưu Cài Đặt
    </button>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const langSelect = document.getElementById('langSelect');
    const currSelect = document.getElementById('currencySelect');
    const saveBtn = document.getElementById('saveSettingsBtn');

    // Load current values
    langSelect.value = localStorage.getItem('lang_mode') || 'VI';
    currSelect.value = localStorage.getItem('currency_mode') || 'BRL';

    saveBtn.addEventListener('click', () => {
      localStorage.setItem('lang_mode', langSelect.value);
      localStorage.setItem('currency_mode', currSelect.value);
      
      // Update global vars so app.js can pick them up (or app.js will just read localstorage on load)
      window.LANG_MODE = langSelect.value;
      window.CURRENCY_MODE = currSelect.value;

      alert('Đã lưu cài đặt thành công!');
      location.reload(); // Reload to apply new settings to header etc.
    });
  });
</script>
{% endblock %}
